<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Products | Good Look Browbar</title>
  <meta name="description" content="Shop Good Look Browbar beauty products online with bank transfer checkout." />
  <meta name="theme-color" content="#f4e8ec" />
  <link rel="icon" href="assets/logo.png" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="site-header" id="top">
    <nav class="nav">
      <a class="brand" href="index.html"><img src="assets/logo.png" alt="Good Look Browbar logo" /></a>
      <button class="menu-btn" id="menuBtn" aria-label="Open menu">☰</button>
      <div class="nav-links" id="navLinks">
        <a href="index.html#services">Services</a>
        <a href="index.html#pricing">Prices</a>
        <a href="products.html">Products</a>
        <a href="index.html#contact">Contact</a>
        <a class="nav-cta" href="index.html#booking">Book Now</a>
      </div>
    </nav>
  </header>

  <main>
    <section class="page-hero reveal">
      <p class="eyebrow">Online shop</p>
      <h1>Beauty products for brows, lashes and daily care.</h1>
      <p>Add products to your cart, then complete checkout on the dedicated checkout page.</p>
    </section>

    <section class="shop-layout section">
      <div>
        <div class="section-head reveal">
          <p class="section-tag">Products</p>
          <h2>Shop products</h2>
        </div>
        <div class="cards product-grid shop-grid" id="shopProducts"></div>
      </div>

      <aside class="cart-panel reveal" id="cart">
        <h2>Your cart</h2>
        <div id="cartItems" class="cart-items"></div>
        <div class="cart-totals">
          <div><span>Subtotal</span><strong id="subtotal">£0.00</strong></div>
        </div>
        <a class="btn primary full" href="checkout.html">Go to Checkout</a>
      </aside>
    </section>
  </main>

  <footer>
    <img src="assets/logo.png" alt="Good Look Browbar logo" />
    <p>© <span id="year"></span> Good Look Browbar. All rights reserved.</p>
  </footer>

  <script src="store.js"></script>
  <script src="script.js"></script>
  <script src="shop.js"></script>
</body>
</html>
